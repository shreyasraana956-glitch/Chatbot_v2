<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Teacher | Intelligent Learning Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            perspective: 1000px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .chat-form {
            position: relative;
            margin-bottom: 40px;
        }

        .input-group {
            position: relative;
            display: flex;
            gap: 12px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 18px 24px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 0 32px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .response-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 24px;
            border-left: 4px solid var(--primary);
            min-height: 100px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .response-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 8px;
            display: block;
        }

        .response-text {
            line-height: 1.6;
            font-size: 1.1rem;
            color: #e2e8f0;
            white-space: pre-wrap;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Micro-animations */
        .loading-dots span {
            animation: bounce 1.4s infinite ease-in-out both;
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            margin: 0 2px;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        @media (max-width: 640px) {
            .card {
                padding: 24px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .input-group {
                flex-direction: column;
            }

            button {
                padding: 18px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">
            <div class="header">
                <h1>AI Teacher</h1>
                <p>Your personal AI-powered academic assistant</p>
            </div>

            <form class="chat-form" method="post">
                {% csrf_token %}
                <div class="input-group">
                    <input type="text" name="question" placeholder="Ask me anything..." required autocomplete="off">
                    <button type="submit">Send Query</button>
                </div>
            </form>

            {% if answer %}
            <div class="response-section">
                <span class="response-label">AI Response</span>
                <div class="response-text">{{ answer|linebreaksbr }}</div>
            </div>
            {% else %}
            <div class="empty-state">
                Waiting for your question...
            </div>
            {% endif %}
        </div>
    </div>

    <script>
        const form = document.querySelector('.chat-form');
        const button = form.querySelector('button');

        form.addEventListener('submit', () => {
            button.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
            button.style.opacity = '0.7';
            button.style.pointerEvents = 'none';
        });
    </script>

</body>

</html>
